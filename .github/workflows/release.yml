name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Semver tag to release (for example v1.2.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Check Out
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set Up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ inputs.tag }}
        run: |
          mkdir -p dist
          out="kpf-${TAG}-${GOOS}-${GOARCH}"
          go build -trimpath -o "dist/${out}" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kpf-${{ inputs.tag }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Draft Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          mapfile -t assets < <(find dist -type f | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "no build artifacts found" >&2
            exit 1
          fi

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --draft \
              --title "${TAG}"
            gh release upload "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber \
              "${assets[@]}"
          else
            gh release create "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --draft \
              --title "${TAG}" \
              --generate-notes \
              "${assets[@]}"
          fi
